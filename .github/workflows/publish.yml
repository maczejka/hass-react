name: Publish to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (e.g. latest, next)'
        required: false
        default: 'latest'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Verify package.json version matches git tag
        if: github.event_name == 'push'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json ($PKG_VERSION) != tag ($TAG)"
            exit 1
          fi

      - name: Check if version already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already on npm — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install latest npm (Trusted Publisher OIDC)
        if: steps.check.outputs.skip == 'false'
        run: npm install -g npm@latest

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: pnpm run build

      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public --provenance --tag ${{ github.event.inputs.tag || 'latest' }}

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes
